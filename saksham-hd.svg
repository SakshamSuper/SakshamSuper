<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="840" height="1060" viewBox="0 0 840 1060">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>

    <!-- Border Glow -->
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 212, 255, 0.3)" />
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.15)" />
    </linearGradient>

    <!-- Terminal Inner Window Clip -->
    <clipPath id="window-clip">
      <rect x="20" y="45" width="800" height="990" rx="8" ry="8"/>
    </clipPath>

    <!-- Scanline / Reveal Animation Clip -->
    <clipPath id="terminal-reveal">
      <rect x="20" y="45" width="800" height="0">
        <animate attributeName="height" from="0" to="990" dur="1.8s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Outer Terminal Window Shell -->
  <rect width="840" height="1060" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="1059" rx="12" fill="none" stroke="url(#border-glow)" stroke-width="1.2"/>
  <line x1="0" y1="35" x2="840" y2="35" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>

  <!-- macOS Window Controls -->
  <circle cx="20" cy="17.5" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="17.5" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="17.5" r="5" fill="#27c93f"/>
  <text x="420" y="21" fill="#7d8590" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" text-anchor="middle">saksham@github: ~$ ./portrait_hd.sh</text>

  <!-- Animated HD Poster Reveal inside Terminal Frame -->
  <g clip-path="url(#terminal-reveal)">
    <g clip-path="url(#window-clip)">
      <image href="./poster.jpg" x="20" y="45" width="800" height="990" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <!-- Cyan Scanline Line Cursor -->
    <rect x="20" y="45" width="800" height="4" fill="#00D4FF" opacity="0.9">
      <animate attributeName="y" from="45" to="1035" dur="1.8s" fill="freeze"/>
      <animate attributeName="opacity" values="0.9;0" begin="1.8s" dur="0.2s" fill="freeze"/>
    </rect>
  </g>
</svg>

    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 212, 255, 0.4)"/>
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.2)"/>
    </linearGradient>
    <clipPath id="window-clip"><rect width="888" height="230" rx="10" ry="10"/></clipPath>
  </defs>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#140a24"/>
      <stop offset="100%" stop-color="#07080c"/>
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(251, 191, 36, 0.25)" />
      <stop offset="100%" stop-color="rgba(0, 212, 255, 0.1)" />
    </linearGradient>
    <clipPath id="window-clip"><rect width="700" height="180" rx="10" ry="10"/></clipPath>
  </defs>

  <g clip-path="url(#window-clip)">
    <!-- Terminal Body -->
    <rect width="700" height="180" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="699" height="179" fill="none" stroke="url(#border-glow)" stroke-width="1.2" rx="10" ry="10" />

    <!-- Title Bar -->
    <rect width="700" height="32" fill="url(#header-bg)"/>
    <line x1="0" y1="32" x2="700" y2="32" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

    <!-- macOS traffic buttons -->
    <circle cx="16" cy="16" r="4.5" fill="#ff5f56"/>
    <circle cx="30" cy="16" r="4.5" fill="#ffbd2e"/>
    <circle cx="44" cy="16" r="4.5" fill="#27c93f"/>
    <text x="350" y="20" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8892A4">console // achievements</text>

    <!-- Terminal Content -->
    <g transform="translate(25, 58)" font-family="'JetBrains Mono', monospace" font-size="12" fill="#E2E8F0">
      <text x="0" y="0"><tspan fill="#ffbd2e">❯ </tspan>./display-achievements</text>
      
      <g transform="translate(15, 22)" fill="#94A3B8">
        <!-- Zero to One -->
        <text x="0" y="0">🏆 <tspan fill="#fbbf24" font-weight="bold">1st Place</tspan> : Zero to One Hackathon (Chandigarh Univ) // Beaten 600+ Teams</text>
        
        <!-- HackLLM -->
        <text x="0" y="20">🥈 <tspan fill="#E2E8F0" font-weight="bold">Runner-Up</tspan> : HackLLM Hackathon (IIIT Delhi) // LLM Agent Track</text>
        
        <!-- Microsoft Cert -->
        <text x="0" y="40">☁️ <tspan fill="#00D4FF" font-weight="bold">Certified</tspan> : Microsoft Azure AI Engineer Associate // AI-102</text>
        
        <!-- Microsoft DS -->
        <text x="0" y="60">☁️ <tspan fill="#00D4FF" font-weight="bold">Certified</tspan> : Microsoft Azure Data Scientist Associate // DP-100</text>
      </g>
    </g>
  </g>
</svg>

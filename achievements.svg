<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" values="-200;1000" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0;1200" dur="4s" repeatCount="indefinite" />
    </linearGradient>
    <clipPath id="windowClip">
      <rect width="800" height="200" rx="10" ry="10" />
    </clipPath>
  </defs>

  <g clip-path="url(#windowClip)">
    <rect width="800" height="200" fill="url(#termBg)"/>
    <rect width="800" height="200" fill="none" stroke="#30363d" stroke-width="2"/>
    <rect width="800" height="35" fill="url(#titleBarGrad)"/>
    <rect width="800" height="35" fill="url(#shimmer)"/>
    
    <circle cx="20" cy="17.5" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="17.5" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="17.5" r="6" fill="#27c93f"/>

    <text x="400" y="23" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" text-anchor="middle">saksham@github:~</text>
    <rect x="0" y="35" width="800" height="1" fill="#30363d"/>

    <g font-family="'Courier New', monospace" font-size="15" transform="translate(25, 65)">
      <text fill="#00D4FF">❯ <tspan fill="#e6edf3">cat achievements.log</tspan></text>
      
      <g transform="translate(10, 30)">
        <!-- Box 1 -->
        <g transform="translate(0, 0)">
          <rect width="230" height="70" rx="6" fill="#0d1117" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.7"/>
          <text x="115" y="25" text-anchor="middle" font-size="20">🏆</text>
          <text x="115" y="45" text-anchor="middle" font-size="14" fill="#e6edf3" font-weight="bold">1st Place</text>
          <text x="115" y="60" text-anchor="middle" font-size="12" fill="#8b949e">Zero to One (600+ Teams)</text>
        </g>

        <!-- Box 2 -->
        <g transform="translate(250, 0)">
          <rect width="230" height="70" rx="6" fill="#0d1117" stroke="#ffbd2e" stroke-width="1.5" stroke-opacity="0.7"/>
          <text x="115" y="25" text-anchor="middle" font-size="20">🥈</text>
          <text x="115" y="45" text-anchor="middle" font-size="14" fill="#e6edf3" font-weight="bold">Runner-Up</text>
          <text x="115" y="60" text-anchor="middle" font-size="12" fill="#8b949e">HackLLM · IIIT Delhi</text>
        </g>

        <!-- Box 3 -->
        <g transform="translate(500, 0)">
          <rect width="230" height="70" rx="6" fill="#0d1117" stroke="#27c93f" stroke-width="1.5" stroke-opacity="0.7"/>
          <text x="115" y="25" text-anchor="middle" font-size="20">⭐</text>
          <text x="115" y="45" text-anchor="middle" font-size="14" fill="#e6edf3" font-weight="bold">Contributor</text>
          <text x="115" y="60" text-anchor="middle" font-size="12" fill="#8b949e">GSSoC · Open Source</text>
        </g>

        <!-- Cursor -->
        <g transform="translate(-10, 95)">
          <text fill="#00D4FF">❯</text>
          <rect x="15" y="-12" width="10" height="15" fill="#e6edf3">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
    </g>
  </g>
</svg>

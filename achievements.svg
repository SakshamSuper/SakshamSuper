<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    .neon-border {
      stroke: #00F5FF;
      stroke-width: 1.5;
      stroke-opacity: 0.8;
      filter: drop-shadow(0px 0px 4px rgba(0, 245, 255, 0.4));
    }
    .text-title {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      fill: #8F9CAE;
    }
    .text-card-header {
      font-family: 'Arial', sans-serif;
      font-weight: bold;
      font-size: 13px;
    }
    .text-card-sub {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      fill: #8b949e;
    }
    .card-element {
      fill: #0d1117;
      stroke-width: 1px;
      rx: 8px;
    }
    .card-cyan { stroke: #00F5FF; stroke-opacity: 0.4; }
    .card-amber { stroke: #ffbd2e; stroke-opacity: 0.4; }
    .card-green { stroke: #27c93f; stroke-opacity: 0.4; }
    .card-purple { stroke: #9D00FF; stroke-opacity: 0.4; }
  </style>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="term-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16"/>
      <stop offset="100%" stop-color="#05060b"/>
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f1124"/>
      <stop offset="100%" stop-color="#070812"/>
    </linearGradient>

    <!-- Clip Path for rounded corners -->
    <clipPath id="window-clip">
      <rect width="800" height="200" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#window-clip)">
    <!-- Terminal Background -->
    <rect width="800" height="200" fill="url(#term-bg)"/>
    
    <!-- Neon cyan outer border -->
    <rect x="0.75" y="0.75" width="798.5" height="198.5" fill="none" class="neon-border" rx="12" ry="12"/>

    <!-- Title Bar -->
    <rect width="800" height="38" fill="url(#header-bg)"/>
    <line x1="0" y1="38" x2="800" y2="38" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- macOS Window Buttons -->
    <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#27c93f"/>

    <!-- Window Title -->
    <text class="text-title" x="400" y="24" text-anchor="middle" font-size="12" letter-spacing="1">saksham@achievements:~</text>
    
    <!-- Tech Info Top Right -->
    <rect x="710" y="12" width="65" height="14" rx="3" fill="#00F5FF" fill-opacity="0.1" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="742" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#00F5FF" font-weight="bold">LOGS</text>

    <!-- Cards container group -->
    <g transform="translate(20, 56)">
      <!-- Card 1: 🏆 1st Place -->
      <g transform="translate(0, 0)">
        <rect width="175" height="124" class="card-element card-cyan"/>
        <text x="87.5" y="44" text-anchor="middle" font-size="34">🏆</text>
        <text class="text-card-header" x="87.5" y="76" text-anchor="middle" fill="#00F5FF">1st Place</text>
        <text class="text-card-sub" x="87.5" y="94" text-anchor="middle">Zero to One</text>
        <text class="text-card-sub" x="87.5" y="108" text-anchor="middle" fill="#00F5FF">600+ Teams</text>
      </g>

      <!-- Card 2: 🥈 Runner-Up -->
      <g transform="translate(193, 0)">
        <rect width="175" height="124" class="card-element card-amber"/>
        <text x="87.5" y="44" text-anchor="middle" font-size="34">🥈</text>
        <text class="text-card-header" x="87.5" y="76" text-anchor="middle" fill="#ffbd2e">Runner-Up</text>
        <text class="text-card-sub" x="87.5" y="94" text-anchor="middle">HackLLM</text>
        <text class="text-card-sub" x="87.5" y="108" text-anchor="middle" fill="#ffbd2e">IIIT Delhi</text>
      </g>

      <!-- Card 3: 🌟 GSSoC -->
      <g transform="translate(386, 0)">
        <rect width="175" height="124" class="card-element card-green"/>
        <text x="87.5" y="44" text-anchor="middle" font-size="34">🌟</text>
        <text class="text-card-header" x="87.5" y="76" text-anchor="middle" fill="#27c93f">Contributor</text>
        <text class="text-card-sub" x="87.5" y="94" text-anchor="middle">GSSoC</text>
        <text class="text-card-sub" x="87.5" y="108" text-anchor="middle" fill="#27c93f">Open Source</text>
      </g>

      <!-- Card 4: ☁️ Certified -->
      <g transform="translate(579, 0)">
        <rect width="181" height="124" class="card-element card-purple"/>
        <text x="90.5" y="40" text-anchor="middle" font-size="28" font-family="'Arial Black', sans-serif" font-weight="900" fill="#9D00FF">5×</text>
        <text class="text-card-header" x="90.5" y="72" text-anchor="middle" fill="#9D00FF">Certified</text>
        <text class="text-card-sub" x="90.5" y="90" text-anchor="middle">AI-102 · DP-100</text>
        <text class="text-card-sub" x="90.5" y="104" text-anchor="middle" fill="#9D00FF">DP-600 · OCI · Postman</text>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" width="750" height="320">
  <defs>
    <!-- Background Gradient matching portfolio -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>

    <!-- Glassmorphic border glow -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0.2"/>
    </linearGradient>

    <clipPath id="cardClip"><rect width="750" height="320" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <!-- Main Card Body -->
    <rect width="750" height="320" fill="url(#cardBg)"/>
    <rect width="750" height="320" fill="none" stroke="url(#borderGlow)" stroke-width="1.5"/>

    <!-- Soft cyan radial glow inside the card -->
    <circle cx="100" cy="80" r="150" fill="#00D4FF" opacity="0.04"/>
    <circle cx="650" cy="240" r="150" fill="#FFB800" opacity="0.03"/>

    <!-- Decorative Top Bar -->
    <rect width="750" height="30" fill="rgba(255,255,255,0.01)"/>
    <line x1="0" y1="30" x2="750" y2="30" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Terminal Dots -->
    <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="15" r="5" fill="#febc2e"/>
    <circle cx="52" cy="15" r="5" fill="#28c840"/>
    <text x="375" y="19" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8892A4">console // Saksham Aggarwal</text>

    <!-- COLUMN 1: Profile / Info (Left) -->
    <g transform="translate(30, 60)">
      <text x="0" y="20" font-family="'Syne', sans-serif" font-size="18" font-weight="700" fill="#EDF2F7">PROFILE</text>
      <line x1="0" y1="30" x2="200" y2="30" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
      
      <g font-family="'DM Sans', sans-serif" font-size="12" fill="#A8B2C0">
        <text x="0" y="55"><tspan font-weight="bold" fill="#00D4FF">Name:</tspan> Saksham Aggarwal</text>
        <text x="0" y="75"><tspan font-weight="bold" fill="#00D4FF">Focus:</tspan> Computer Vision, LLMs</text>
        <text x="0" y="95"><tspan font-weight="bold" fill="#00D4FF">Dept:</tspan> AI &amp; Data Science</text>
        <text x="0" y="115"><tspan font-weight="bold" fill="#00D4FF">Loc:</tspan> New Delhi, India</text>
      </g>
      
      <!-- Tech quick flags -->
      <g transform="translate(0, 140)">
        <rect x="0" y="0" width="60" height="20" rx="4" fill="rgba(0, 212, 255, 0.08)" stroke="rgba(0, 212, 255, 0.2)" stroke-width="0.5"/>
        <text x="30" y="13" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00D4FF">Python</text>

        <rect x="68" y="0" width="68" height="20" rx="4" fill="rgba(0, 212, 255, 0.08)" stroke="rgba(0, 212, 255, 0.2)" stroke-width="0.5"/>
        <text x="102" y="13" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00D4FF">PyTorch</text>

        <rect x="144" y="0" width="56" height="20" rx="4" fill="rgba(0, 212, 255, 0.08)" stroke="rgba(0, 212, 255, 0.2)" stroke-width="0.5"/>
        <text x="172" y="13" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00D4FF">OpenCV</text>
      </g>
      
      <!-- Open to work badge -->
      <g transform="translate(0, 180)">
        <rect width="110" height="24" rx="12" fill="rgba(0, 229, 160, 0.08)" stroke="rgba(0, 229, 160, 0.25)" stroke-width="1"/>
        <circle cx="16" cy="12" r="4" fill="#00E5A0"/>
        <text x="28" y="16" font-family="'DM Sans', sans-serif" font-weight="bold" font-size="10" fill="#00E5A0">OPEN TO WORK</text>
      </g>
    </g>

    <!-- COLUMN 2: Certifications (Middle) -->
    <g transform="translate(270, 60)">
      <text x="0" y="20" font-family="'Syne', sans-serif" font-size="18" font-weight="700" fill="#EDF2F7">CREDENTIALS</text>
      <line x1="0" y1="30" x2="200" y2="30" stroke="#FFB800" stroke-width="1" opacity="0.3"/>
      
      <g font-family="'DM Sans', sans-serif" font-size="12" fill="#A8B2C0">
        <!-- Azure AI -->
        <g transform="translate(0, 48)">
          <circle cx="6" cy="6" r="3" fill="#FFB800"/>
          <text x="18" y="10" font-weight="bold" fill="#EDF2F7">Azure AI Engineer Associate</text>
          <text x="18" y="24" font-size="10.5" fill="#8892A4">AI-102 · Microsoft Certified</text>
        </g>
        <!-- Azure Data Scientist -->
        <g transform="translate(0, 94)">
          <circle cx="6" cy="6" r="3" fill="#FFB800"/>
          <text x="18" y="10" font-weight="bold" fill="#EDF2F7">Data Scientist Associate</text>
          <text x="18" y="24" font-size="10.5" fill="#8892A4">DP-100 · Microsoft Certified</text>
        </g>
        <!-- Oracle OCI -->
        <g transform="translate(0, 140)">
          <circle cx="6" cy="6" r="3" fill="#FFB800"/>
          <text x="18" y="10" font-weight="bold" fill="#EDF2F7">Oracle Cloud Infrastructure</text>
          <text x="18" y="24" font-size="10.5" fill="#8892A4">OCI Certified Associate</text>
        </g>
      </g>
    </g>

    <!-- COLUMN 3: Hackathons / Wins (Right) -->
    <g transform="translate(510, 60)">
      <text x="0" y="20" font-family="'Syne', sans-serif" font-size="18" font-weight="700" fill="#EDF2F7">ACHIEVEMENTS</text>
      <line x1="0" y1="30" x2="210" y2="30" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>

      <!-- Win 1 -->
      <g transform="translate(0, 48)">
        <text x="0" y="10" font-size="20">🏆</text>
        <text x="32" y="5" font-family="'DM Sans', sans-serif" font-size="12" font-weight="bold" fill="#EDF2F7">1st Place / Zero to One</text>
        <text x="32" y="19" font-family="'Courier New', monospace" font-size="10" fill="#00E5A0">Chandigarh Univ // 600+ teams</text>
      </g>

      <!-- Win 2 -->
      <g transform="translate(0, 102)">
        <text x="0" y="10" font-size="20">🥈</text>
        <text x="32" y="5" font-family="'DM Sans', sans-serif" font-size="12" font-weight="bold" fill="#EDF2F7">Runner-Up / HackLLM</text>
        <text x="32" y="19" font-family="'Courier New', monospace" font-size="10" fill="#00E5A0">IIIT Delhi // LLM Track</text>
      </g>

      <!-- Stat summary row -->
      <g transform="translate(0, 165)" font-family="'JetBrains Mono', monospace">
        <!-- repos count -->
        <text x="0" y="15" font-size="18" font-weight="bold" fill="#00D4FF">6+</text>
        <text x="0" y="28" font-size="9" fill="#8892A4">PROJECTS</text>
        
        <!-- certifications count -->
        <text x="75" y="15" font-size="18" font-weight="bold" fill="#FFB800">5×</text>
        <text x="75" y="28" font-size="9" fill="#8892A4">CERTS</text>

        <!-- wins count -->
        <text x="145" y="15" font-size="18" font-weight="bold" fill="#00E5A0">2×</text>
        <text x="145" y="28" font-size="9" fill="#8892A4">HACKATHONS</text>
      </g>
    </g>
  </g>
</svg>

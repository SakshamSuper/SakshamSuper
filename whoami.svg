<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <!-- Terminal Background Gradient -->
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Title Bar Gradient -->
    <linearGradient id="titleBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>

    <!-- Shimmer Animation on Title Bar -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" values="-200;900" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0;1100" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Border Radius Clip Path -->
    <clipPath id="windowClip">
      <rect width="700" height="320" rx="10" ry="10" />
    </clipPath>
  </defs>

  <g clip-path="url(#windowClip)">
    <!-- Main Background -->
    <rect width="700" height="320" fill="url(#termBg)"/>
    <rect width="700" height="320" fill="none" stroke="#30363d" stroke-width="2"/>

    <!-- Title Bar -->
    <rect width="700" height="35" fill="url(#titleBarGrad)"/>
    <rect width="700" height="35" fill="url(#shimmer)"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="17.5" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="17.5" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="17.5" r="6" fill="#27c93f"/>

    <text x="350" y="23" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" text-anchor="middle">saksham@github:~</text>
    <rect x="0" y="35" width="700" height="1" fill="#30363d"/>

    <!-- Terminal Content -->
    <g font-family="'Courier New', monospace" font-size="15" transform="translate(25, 70)">
      <!-- Command -->
      <text fill="#00D4FF">❯ <tspan fill="#e6edf3">cat profile.json</tspan></text>
      
      <!-- Content Rows -->
      <g transform="translate(0, 35)">
        <text y="0"><tspan fill="#8b949e">name      →</tspan> <tspan fill="#e6edf3" font-weight="bold">'Saksham Aggarwal'</tspan></text>
        <text y="30"><tspan fill="#8b949e">role      →</tspan> <tspan fill="#00D4FF">'AI Engineer &amp; Data Scientist'</tspan></text>
        <text y="60"><tspan fill="#8b949e">location  →</tspan> <tspan fill="#e6edf3">'New Delhi, India'</tspan></text>
        <text y="90"><tspan fill="#8b949e">uni       →</tspan> <tspan fill="#e6edf3">'GGSIPU'</tspan></text>
        <text y="120"><tspan fill="#8b949e">focus     →</tspan> <tspan fill="#00D4FF">'Computer Vision · LLM · ML Forecasting'</tspan></text>
        <text y="150"><tspan fill="#8b949e">certs     →</tspan> <tspan fill="#ffbd2e">'AI-102 · DP-100 · DP-600 · OCI · Postman'</tspan></text>
        <text y="180"><tspan fill="#8b949e">wins      →</tspan> <tspan fill="#27c93f">'🏆 1st Zero to One (600+ teams)'</tspan></text>
        <text y="210"><tspan fill="#8b949e">status    →</tspan> <tspan fill="#27c93f">'✓ Open to Work'</tspan></text>
        
        <!-- Prompt & Cursor -->
        <g transform="translate(0, 240)">
          <text fill="#00D4FF">❯</text>
          <rect x="15" y="-12" width="10" height="15" fill="#e6edf3">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
    </g>
  </g>
</svg>

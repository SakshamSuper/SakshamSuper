<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes line-shimmer {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    .cursor {
      animation: blink 1s infinite;
      fill: #00F5FF;
    }
    .neon-border {
      stroke: #00F5FF;
      stroke-width: 1.5;
      stroke-opacity: 0.8;
      filter: drop-shadow(0px 0px 4px rgba(0, 245, 255, 0.4));
    }
    .text-title {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      fill: #8F9CAE;
    }
    .text-body {
      font-family: 'Courier New', monospace;
      font-size: 13.5px;
      fill: #e6edf3;
    }
    .text-accent {
      fill: #00F5FF;
      font-weight: bold;
    }
    .text-purple {
      fill: #9D00FF;
    }
    .text-muted {
      fill: #636e7b;
    }
  </style>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="term-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16"/>
      <stop offset="100%" stop-color="#05060b"/>
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f1124"/>
      <stop offset="100%" stop-color="#070812"/>
    </linearGradient>

    <!-- Clip Path for rounded corners -->
    <clipPath id="window-clip">
      <rect width="700" height="320" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#window-clip)">
    <!-- Terminal Background -->
    <rect width="700" height="320" fill="url(#term-bg)"/>
    
    <!-- Neon outer border path -->
    <rect x="0.75" y="0.75" width="698.5" height="318.5" fill="none" class="neon-border" rx="12" ry="12"/>

    <!-- Title Bar -->
    <rect width="700" height="38" fill="url(#header-bg)"/>
    <line x1="0" y1="38" x2="700" y2="38" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- macOS Window Buttons -->
    <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#27c93f"/>

    <!-- Window Title -->
    <text class="text-title" x="350" y="24" text-anchor="middle" font-size="12" letter-spacing="1">saksham@cyber-hud:~</text>
    
    <!-- Tech Info Top Right -->
    <rect x="610" y="12" width="65" height="14" rx="3" fill="#00F5FF" fill-opacity="0.1" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="642" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#00F5FF" font-weight="bold">ONLINE</text>

    <!-- Grid background pattern overlay (subtle) -->
    <path d="M 0 0 L 700 0 M 0 20 L 700 20" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.03"/>

    <!-- Terminal Content Area -->
    <g transform="translate(30, 75)" class="text-body">
      <!-- Line 1: Command prompt -->
      <text y="0">
        <tspan class="text-accent">❯ </tspan>
        <tspan font-weight="bold" fill="#ffffff">cat developer_profile.json</tspan>
      </text>

      <!-- JSON structure -->
      <g transform="translate(15, 30)">
        <text y="0"><tspan class="text-muted">"identity":</tspan> {</text>
        <text y="20"><tspan class="text-muted">  "full_name":</tspan> <tspan fill="#a5d6ff">"Saksham Aggarwal"</tspan>,</text>
        <text y="40"><tspan class="text-muted">  "title":</tspan> <tspan class="text-accent">"AI Engineer &amp; Data Scientist"</tspan>,</text>
        <text y="60"><tspan class="text-muted">  "location":</tspan> <tspan fill="#a5d6ff">"New Delhi, India"</tspan>,</text>
        <text y="80"><tspan class="text-muted">  "education":</tspan> <tspan fill="#e6edf3">"GGSIPU (Guru Gobind Singh Indraprastha Univ)"</tspan></text>
        <text y="100">},</text>

        <text y="125"><tspan class="text-muted">"specialization":</tspan> {</text>
        <text y="145"><tspan class="text-muted">  "domains":</tspan> [<tspan fill="#ffbd2e">"Computer Vision"</tspan>, <tspan fill="#ffbd2e">"LLM Agents"</tspan>, <tspan fill="#ffbd2e">"ML Forecasting"</tspan>],</text>
        <text y="165"><tspan class="text-muted">  "cloud_ai":</tspan> <tspan fill="#a5d6ff">"Azure Certified (AI-102 Associate)"</tspan></text>
        <text y="185">},</text>

        <text y="210"><tspan class="text-muted">"achievements":</tspan> {</text>
        <text y="230"><tspan class="text-muted">  "zero_to_one":</tspan> <tspan fill="#27c93f">"🏆 1st Place (out of 600+ teams)"</tspan></text>
        <text y="250">}</text>
      </g>

      <!-- Blinking prompt cursor -->
      <g transform="translate(0, 290)">
        <text class="text-accent" y="0">❯</text>
        <rect class="cursor" x="16" y="-12" width="8" height="15" rx="1"/>
      </g>
    </g>
  </g>
</svg>

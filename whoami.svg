<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 470" width="450" height="470">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f111a"/>
      <stop offset="100%" stop-color="#07080c"/>
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 212, 255, 0.2)" />
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.08)" />
    </linearGradient>
    <clipPath id="window-clip"><rect width="450" height="470" rx="10" ry="10"/></clipPath>
  </defs>

  <g clip-path="url(#window-clip)">
    <!-- Terminal Body -->
    <rect width="450" height="470" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="449" height="469" fill="none" stroke="url(#border-glow)" stroke-width="1.2" rx="10" ry="10" />

    <!-- Title Bar -->
    <rect width="450" height="32" fill="url(#header-bg)"/>
    <line x1="0" y1="32" x2="450" y2="32" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

    <!-- macOS traffic buttons -->
    <circle cx="16" cy="16" r="4.5" fill="#ff5f56"/>
    <circle cx="30" cy="16" r="4.5" fill="#ffbd2e"/>
    <circle cx="44" cy="16" r="4.5" fill="#27c93f"/>
    <text x="225" y="20" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8892A4">console // whoami</text>

    <!-- Terminal Content -->
    <g transform="translate(25, 58)" font-family="'JetBrains Mono', monospace" font-size="12" fill="#E2E8F0">
      <text x="0" y="0"><tspan fill="#00D4FF">❯ </tspan>whoami</text>
      
      <g transform="translate(15, 22)" fill="#94A3B8">
        <text x="0" y="0">Name  : <tspan fill="#F8FAFC" font-weight="bold">Saksham Aggarwal</tspan></text>
        <text x="0" y="18">Role  : <tspan fill="#00D4FF">AI &amp; Data Scientist</tspan></text>
        <text x="0" y="36">Focus : <tspan fill="#F8FAFC">CV · LLMs · Forecasting</tspan></text>
        <text x="0" y="54">Loc   : <tspan fill="#F8FAFC">New Delhi, India</tspan></text>
      </g>

      <text x="0" y="95"><tspan fill="#00D4FF">❯ </tspan>cat certifications.json</text>
      <g transform="translate(15, 117)" fill="#94A3B8">
        <text x="0" y="0">✓ <tspan fill="#F8FAFC">Azure AI Engineer (AI-102)</tspan></text>
        <text x="0" y="18">✓ <tspan fill="#F8FAFC">Azure Data Scientist (DP-100)</tspan></text>
        <text x="0" y="36">✓ <tspan fill="#F8FAFC">Fabric Analytics (DP-600)</tspan></text>
        <text x="0" y="54">✓ <tspan fill="#F8FAFC">Oracle OCI Associate</tspan></text>
        <text x="0" y="72">✓ <tspan fill="#F8FAFC">Postman API Specialist</tspan></text>
      </g>

      <text x="0" y="215"><tspan fill="#00D4FF">❯ </tspan>cat hackathons.log</text>
      <g transform="translate(15, 237)" fill="#94A3B8">
        <text x="0" y="0">🏆 <tspan fill="#fbbf24" font-weight="bold">1st Place</tspan> : Zero to One (CU)</text>
        <text x="18" y="15" font-size="10.5" fill="#64748B">// Beaten 600+ Teams</text>
        
        <text x="0" y="35">🥈 <tspan fill="#F8FAFC" font-weight="bold">Runner-Up</tspan> : HackLLM (IIIT-D)</text>
        <text x="18" y="50" font-size="10.5" fill="#64748B">// LLM Agent Track</text>
      </g>

      <text x="0" y="315"><tspan fill="#00D4FF">❯ </tspan>echo $STATUS</text>
      <text x="15" y="335" fill="#10b981" font-weight="bold">Open to Work ✓</text>
    </g>

    <!-- Active dot top right -->
    <circle cx="425" cy="16" r="3.5" fill="#10b981">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>

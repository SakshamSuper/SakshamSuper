<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-700;800;-700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-300;1200;-300" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="c"><rect width="700" height="300" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <rect width="700" height="300" fill="url(#bg)"/>

    <!-- Title bar -->
    <rect width="700" height="36" fill="url(#titleBar)"/>
    <rect width="700" height="36" fill="url(#shimmer)"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="350" y="23" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">whoami.sh — saksham@github</text>

    <!-- Left accent bar -->
    <rect x="0" y="36" width="3" height="264" fill="#00d4ff" opacity="0.7"/>

    <!-- Command prompt -->
    <text x="20" y="64" font-family="'Courier New',monospace" font-size="13" fill="#00d4ff">❯</text>
    <text x="34" y="64" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">cat profile.json</text>

    <!-- Divider -->
    <line x1="20" y1="72" x2="690" y2="72" stroke="#21262d" stroke-width="1"/>

    <!-- Profile rows -->
    <text x="24" y="92"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  name     </text>
    <text x="130" y="92" font-family="'Courier New',monospace" font-size="12.5" fill="#e6edf3">→  "Saksham Aggarwal"</text>

    <text x="24" y="114"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  role     </text>
    <text x="130" y="114" font-family="'Courier New',monospace" font-size="12.5" fill="#00d4ff">"AI Engineer &amp; Data Scientist"</text>

    <text x="24" y="136"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  location </text>
    <text x="130" y="136" font-family="'Courier New',monospace" font-size="12.5" fill="#e6edf3">"New Delhi, India"</text>

    <text x="24" y="158"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  uni      </text>
    <text x="130" y="158" font-family="'Courier New',monospace" font-size="12.5" fill="#e6edf3">"GGSIPU, New Delhi"</text>

    <text x="24" y="180"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  focus    </text>
    <text x="130" y="180" font-family="'Courier New',monospace" font-size="12.5" fill="#00d4ff">"CV · LLM · ML Forecasting · Azure AI"</text>

    <text x="24" y="202"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  certs    </text>
    <text x="130" y="202" font-family="'Courier New',monospace" font-size="12.5" fill="#ffbd2e">"AI-102 · DP-100 · DP-600 · OCI · Postman"</text>

    <text x="24" y="224"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  wins     </text>
    <text x="130" y="224" font-family="'Courier New',monospace" font-size="12.5" fill="#28c840">"🏆 1st Place · Zero to One (600+ teams)"</text>

    <text x="24" y="246"  font-family="'Courier New',monospace" font-size="12.5" fill="#636e7b">  status   </text>
    <text x="130" y="246" font-family="'Courier New',monospace" font-size="12.5" fill="#28c840">"✓ Open to Work"</text>

    <!-- Divider -->
    <line x1="20" y1="258" x2="690" y2="258" stroke="#21262d" stroke-width="1"/>

    <!-- Blinking prompt -->
    <text x="20" y="282" font-family="'Courier New',monospace" font-size="13" fill="#00d4ff">❯</text>
    <rect x="34" y="270" width="9" height="14" fill="#e6edf3" rx="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>

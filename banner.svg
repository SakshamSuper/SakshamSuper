<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Glowing text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#00D4FF"/>
      <stop offset="70%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Faint grid pattern matching the portfolio's bg-grid-pattern -->
    <pattern id="dot-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <!-- Soft ambient cyan bloom -->
    <radialGradient id="cyan-bloom" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020817" stop-opacity="0"/>
    </radialGradient>

    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00D4FF" flood-opacity="0.3"/>
    </filter>

    <!-- Shimmer overlay gradient -->
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-600;1400;-600" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-200;1800;-200" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Clip path to name shape -->
    <clipPath id="name-clip">
      <text x="600" y="180" text-anchor="middle"
        font-family="'Space Grotesk', 'Arial Black', sans-serif"
        font-size="140" font-weight="900" letter-spacing="-3">SAKSHAM</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" />
  <rect width="1200" height="300" fill="url(#dot-grid)" />
  <circle cx="600" cy="150" r="500" fill="url(#cyan-bloom)"/>

  <!-- Twinkling stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="60" r="1">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="340" cy="80" r="1.2">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="850" cy="50" r="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="1020" cy="70" r="1.5">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- HUD Line elements -->
  <g opacity="0.2">
    <line x1="80" y1="235" x2="1120" y2="235" stroke="#00D4FF" stroke-width="1"/>
    <rect x="50" y="40" width="1100" height="1" fill="#00D4FF" />
  </g>

  <!-- Giant Bold Name with Glow -->
  <text x="600" y="180" text-anchor="middle"
    font-family="'Space Grotesk', 'Arial Black', sans-serif"
    font-size="140" font-weight="900" letter-spacing="-3"
    fill="url(#text-grad)" filter="url(#neon-glow)">
    SAKSHAM
  </text>
  
  <!-- Shimmer Sweep Overlay -->
  <rect x="0" y="40" width="1200" height="200" fill="url(#shimmer)" clip-path="url(#name-clip)"/>

  <!-- Subtitle -->
  <text x="600" y="222" text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="16" font-weight="600" fill="#00D4FF" letter-spacing="4">
    AI ENGINEER &amp; DATA SCIENTIST
  </text>

  <!-- HUD Telemetry on bottom -->
  <g opacity="0.4" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8892A4">
    <text x="80" y="270">SYS.STATUS: ONLINE</text>
    <text x="1120" y="270" text-anchor="end">LOC: NEW DELHI, INDIA</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020612"/>
      <stop offset="50%" stop-color="#070d1e"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>

    <!-- Metallic Cyan-to-Purple Gradient -->
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#00D4FF"/>
      <stop offset="65%" stop-color="#38bdf8"/>
      <stop offset="85%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Ambient Glowing Orbs -->
    <radialGradient id="cyan-glow" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020612" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="purple-glow" cx="65%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020612" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot Grid Pattern -->
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#00D4FF" fill-opacity="0.08"/>
    </pattern>

    <!-- Drop Shadow Neon Effect -->
    <filter id="neon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00D4FF" flood-opacity="0.35"/>
    </filter>

    <!-- Shimmer Sweep Gradient -->
    <linearGradient id="shimmer-sweep" x1="-100%" y1="0%" x2="-30%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-600;1400;-600" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-100;1900;-100" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="text-clip">
      <text x="600" y="165" text-anchor="middle"
        font-family="'Space Grotesk', 'Arial Black', sans-serif"
        font-size="130" font-weight="900" letter-spacing="-3">SAKSHAM</text>
    </clipPath>
  </defs>

  <!-- Base Canvas Background -->
  <rect width="1200" height="320" rx="14" fill="url(#bg-grad)" />
  <rect width="1200" height="320" rx="14" fill="url(#dot-grid)" />

  <!-- Ambient Glow Backdrops -->
  <circle cx="450" cy="140" r="450" fill="url(#cyan-glow)"/>
  <circle cx="750" cy="150" r="380" fill="url(#purple-glow)"/>

  <!-- HUD Corner Bracket Accents -->
  <g stroke="#00D4FF" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Top-Left -->
    <path d="M 25,45 L 25,25 L 45,25"/>
    <!-- Top-Right -->
    <path d="M 1175,45 L 1175,25 L 1155,25"/>
    <!-- Bottom-Left -->
    <path d="M 25,275 L 25,295 L 45,295"/>
    <!-- Bottom-Right -->
    <path d="M 1175,275 L 1175,295 L 1155,295"/>
  </g>

  <!-- Horizontal Tech Guide Lines -->
  <g opacity="0.2">
    <line x1="50" y1="40" x2="1150" y2="40" stroke="#00D4FF" stroke-width="1" stroke-dasharray="8 4"/>
    <line x1="50" y1="280" x2="1150" y2="280" stroke="#00D4FF" stroke-width="1" stroke-dasharray="8 4"/>
  </g>

  <!-- Floating Skill Pills -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">
    <!-- Pill 1: LLM Agents -->
    <g transform="translate(100, 70)">
      <rect width="120" height="24" rx="12" fill="#07192e" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
      <text x="60" y="16" text-anchor="middle" fill="#00D4FF">🤖 LLM AGENTS</text>
    </g>
    <!-- Pill 2: Computer Vision -->
    <g transform="translate(970, 70)">
      <rect width="130" height="24" rx="12" fill="#130e28" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
      <text x="65" y="16" text-anchor="middle" fill="#8b5cf6">👁️ COMPUTER VISION</text>
    </g>
    <!-- Pill 3: Azure AI -->
    <g transform="translate(110, 230)">
      <rect width="110" height="24" rx="12" fill="#07192e" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
      <text x="55" y="16" text-anchor="middle" fill="#00D4FF">☁️ AZURE AI</text>
    </g>
    <!-- Pill 4: ML Forecasting -->
    <g transform="translate(960, 230)">
      <rect width="140" height="24" rx="12" fill="#0b1c1e" stroke="#10b981" stroke-width="1" opacity="0.8"/>
      <text x="70" y="16" text-anchor="middle" fill="#10b981">📈 ML FORECASTING</text>
    </g>
  </g>

  <!-- Giant Bold Center Title: SAKSHAM -->
  <text x="600" y="165" text-anchor="middle"
    font-family="'Space Grotesk', 'Arial Black', sans-serif"
    font-size="130" font-weight="900" letter-spacing="-3"
    fill="url(#name-grad)" filter="url(#neon-shadow)">
    SAKSHAM
  </text>

  <!-- Shimmer Sweep Light Animation -->
  <rect x="0" y="30" width="1200" height="180" fill="url(#shimmer-sweep)" clip-path="url(#text-clip)"/>

  <!-- Subtitle Label -->
  <text x="600" y="212" text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="16" font-weight="700" fill="#00D4FF" letter-spacing="5">
    AI ENGINEER &amp; DATA SCIENTIST
  </text>

  <!-- Animated Pulse Dot -->
  <circle cx="365" cy="207" r="3" fill="#10b981">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom Telemetry HUD Bar -->
  <g opacity="0.45" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#8892A4">
    <text x="60" y="300">SYS.STATUS: ONLINE // 200 OK</text>
    <text x="1140" y="300" text-anchor="end">LOC: NEW DELHI, INDIA</text>
  </g>
</svg>

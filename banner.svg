<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#0e0e12"/>
    </linearGradient>

    <!-- Faint grid pattern matching the portfolio's bg-grid-pattern -->
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <!-- Soft ambient orbs from portfolio -->
    <radialGradient id="orb-blue" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#08080a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orb-purple" cx="80%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#08080a" stop-opacity="0" />
    </radialGradient>

    <!-- Text gradient for name -->
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="45%" stop-color="#F8FAFC" />
      <stop offset="75%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <!-- Outer border glow -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.03)" />
      <stop offset="50%" stop-color="rgba(14, 165, 233, 0.15)" />
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.1)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" />
  <rect width="1200" height="320" fill="url(#dot-grid)" />
  
  <!-- Ambient Orbs -->
  <rect width="1200" height="320" fill="url(#orb-blue)" />
  <rect width="1200" height="320" fill="url(#orb-purple)" />

  <!-- Premium Subtle Border -->
  <rect x="1" y="1" width="1198" height="318" fill="none" stroke="url(#border-grad)" stroke-width="1.5" rx="16" />

  <!-- Code Symbol (Top Left) -->
  <text x="50" y="60" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="bold" font-size="20" fill="#F8FAFC" opacity="0.9">&lt;/&gt;</text>
  
  <!-- Header Text Group -->
  <g transform="translate(80, 0)">
    <!-- Sub-heading/Eyebrow -->
    <text x="0" y="105" font-family="'Inter', system-ui, sans-serif" font-weight="bold" font-size="11" fill="#0ea5e9" letter-spacing="3" opacity="0.8">
      AI ENGINEER &amp; DATA SCIENTIST
    </text>

    <!-- Main Title -->
    <text x="0" y="165" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="bold" font-size="52" fill="url(#name-grad)" letter-spacing="-1">
      Saksham Aggarwal
    </text>

    <!-- Description -->
    <text x="0" y="215" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#94A3B8" font-weight="500">
      Building intelligent systems through Machine Learning, Computer Vision, and Data Science.
    </text>
  </g>

  <!-- Availability Badge (Top Right) -->
  <g transform="translate(1000, 42)">
    <rect width="140" height="26" rx="13" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16, 185, 129, 0.25)" stroke-width="1" />
    <circle cx="20" cy="13" r="4.5" fill="#10b981">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="34" y="17" font-family="'Inter', system-ui, sans-serif" font-weight="bold" font-size="10.5" fill="#10b981" letter-spacing="0.5">OPEN TO WORK</text>
  </g>

  <!-- Bottom Telemetry HUD line -->
  <line x1="50" y1="260" x2="1150" y2="260" stroke="#ffffff" stroke-dasharray="4 4" stroke-opacity="0.05" stroke-width="1.5" />
  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748B" opacity="0.8">
    <text x="50" y="285">SYS.LOAD: ACTIVE</text>
    <text x="1150" y="285" text-anchor="end">GGSIPU // DELHI, INDIA</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e0520"/>
      <stop offset="30%" stop-color="#1e0d42"/>
      <stop offset="70%" stop-color="#3a1870"/>
      <stop offset="100%" stop-color="#0e0520"/>
    </linearGradient>

    <!-- Horizon Glow -->
    <radialGradient id="glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#b695f2" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Name Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>

    <!-- Shimmer Animation Gradient -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" values="-600;1800" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" values="-400;2000" dur="3s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Subtitle Text Gradient -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8b2d1"/>
      <stop offset="100%" stop-color="#ccd6f6"/>
    </linearGradient>
    
    <!-- Mountain Gradients -->
    <linearGradient id="mount1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1154"/>
      <stop offset="100%" stop-color="#0b041a"/>
    </linearGradient>
    <linearGradient id="mount2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e0c3a"/>
      <stop offset="100%" stop-color="#05020d"/>
    </linearGradient>
    <linearGradient id="mount3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#120626"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- Sky Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="150" cy="50" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="80" r="2.0"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="120" r="1.0"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="40" r="1.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="70" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="180" r="1.8"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="150" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Far Mountains -->
  <path d="M0,400 L0,250 L150,150 L350,280 L550,120 L800,260 L1000,100 L1200,220 L1200,400 Z" fill="url(#mount1)" opacity="0.8"/>
  
  <!-- Mid Mountains -->
  <path d="M0,400 L0,300 L200,200 L450,320 L700,180 L950,300 L1200,150 L1200,400 Z" fill="url(#mount2)" opacity="0.9"/>
  
  <!-- Near Mountains -->
  <path d="M0,400 L0,350 L300,250 L600,350 L900,200 L1200,320 L1200,400 Z" fill="url(#mount3)"/>

  <!-- Name Text Group -->
  <g text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900">
    <!-- Shadow -->
    <text x="604" y="249" font-size="195" fill="#000" opacity="0.5" letter-spacing="4">SAKSHAM</text>
    <!-- Main Text -->
    <text x="600" y="245" font-size="195" fill="url(#textGrad)" letter-spacing="4">SAKSHAM</text>
    <!-- Shimmer Text -->
    <text x="600" y="245" font-size="195" fill="url(#shimmer)" letter-spacing="4">SAKSHAM</text>
    
    <!-- Subtitle -->
    <text x="600" y="310" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#subGrad)" letter-spacing="8">AI ENGINEER · DATA SCIENTIST</text>
  </g>
</svg>

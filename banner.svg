<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>

    <!-- Sky gradient: deep navy to midnight -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#020817"/>
      <stop offset="35%"  stop-color="#041428"/>
      <stop offset="65%"  stop-color="#001a2e"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>

    <!-- Cyan horizon glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="72%" r="35%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="20%"  stop-color="#0077aa" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#003355" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Side ambient blooms -->
    <radialGradient id="bloomLeft" cx="0%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomRight" cx="100%" cy="40%" r="40%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Mountain gradients -->
    <linearGradient id="mtnFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a2040"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#051828"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="mtnNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#020f1c"/>
      <stop offset="100%" stop-color="#010810"/>
    </linearGradient>

    <!-- Name gradient cyan -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#a0f0ff"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>

    <!-- Shimmer sweep animation -->
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-600;1400;-600" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-200;1800;-200" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Clip to name shape for shimmer -->
    <clipPath id="nameClip">
      <text x="280" y="210" font-family="'Arial Black','Impact',sans-serif"
        font-size="130" font-weight="900" letter-spacing="-4">SAKSHAM</text>
    </clipPath>

    <!-- Drop shadow for name -->
    <filter id="nameShadow" x="-4%" y="-10%" width="108%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00D4FF" flood-opacity="0.4"/>
    </filter>

    <!-- Cyan glow for sub-text -->
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Grid dot pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#00D4FF" opacity="0.08"/>
    </pattern>

    <clipPath id="clip"><rect width="1200" height="400"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Background -->
    <rect width="1200" height="400" fill="url(#sky)"/>
    <rect width="1200" height="400" fill="url(#dots)"/>
    <rect width="1200" height="400" fill="url(#bloomLeft)"/>
    <rect width="1200" height="400" fill="url(#bloomRight)"/>
    <rect width="1200" height="400" fill="url(#horizonGlow)"/>

    <!-- Stars -->
    <circle cx="80"  cy="30"  r="1.2" fill="#fff" opacity="0.7"/>
    <circle cx="190" cy="55"  r="0.8" fill="#fff" opacity="0.5"/>
    <circle cx="320" cy="20"  r="1.0" fill="#fff" opacity="0.8"/>
    <circle cx="500" cy="45"  r="0.7" fill="#fff" opacity="0.4"/>
    <circle cx="640" cy="15"  r="1.1" fill="#fff" opacity="0.6"/>
    <circle cx="780" cy="40"  r="0.9" fill="#fff" opacity="0.5"/>
    <circle cx="900" cy="25"  r="1.3" fill="#00D4FF" opacity="0.6"/>
    <circle cx="1050" cy="50" r="0.8" fill="#fff" opacity="0.7"/>
    <circle cx="1150" cy="20" r="1.0" fill="#fff" opacity="0.5"/>
    <circle cx="420" cy="70"  r="0.6" fill="#00D4FF" opacity="0.5"/>
    <circle cx="860" cy="65"  r="0.7" fill="#fff" opacity="0.3"/>

    <!-- Far mountains -->
    <path d="M0,320 L80,240 L160,270 L250,200 L340,250 L420,190 L500,230 L580,180 L660,220 L740,170 L820,215 L900,175 L980,220 L1060,185 L1140,225 L1200,195 L1200,400 L0,400 Z"
          fill="url(#mtnFar)" opacity="0.8"/>

    <!-- Mid mountains -->
    <path d="M0,370 L100,290 L200,330 L310,270 L400,310 L500,255 L600,300 L700,260 L800,305 L900,265 L1000,310 L1100,275 L1200,315 L1200,400 L0,400 Z"
          fill="url(#mtnMid)"/>

    <!-- Near mountains -->
    <path d="M0,400 L150,340 L280,360 L400,320 L530,355 L660,315 L780,350 L910,320 L1050,360 L1200,340 L1200,400 Z"
          fill="url(#mtnNear)"/>

    <!-- Horizon line glow -->
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#00D4FF" stroke-width="0.5" opacity="0.25"/>

    <!-- LEFT TEXT BLOCK -->
    <!-- "SAKSHAM" big name with gradient + shadow -->
    <text x="60" y="210"
      font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
      font-size="130" font-weight="900" letter-spacing="-4"
      fill="url(#nameGrad)" filter="url(#nameShadow)">SAKSHAM</text>

    <!-- Shimmer overlay clipped to name -->
    <rect x="0" y="80" width="700" height="160" fill="url(#shimmer)" clip-path="url(#nameClip)"/>

    <!-- "AGGARWAL" subtitle name -->
    <text x="63" y="255"
      font-family="'Arial Black','Impact',sans-serif"
      font-size="52" font-weight="900" letter-spacing="18"
      fill="#ffffff" opacity="0.18">AGGARWAL</text>

    <!-- Role line -->
    <rect x="60" y="272" width="3" height="32" fill="#00D4FF" rx="2"/>
    <text x="74" y="291"
      font-family="'Segoe UI','Helvetica Neue',sans-serif"
      font-size="18" font-weight="600" fill="#00D4FF" filter="url(#glowCyan)">AI Engineer</text>
    <text x="74" y="313"
      font-family="'Segoe UI','Helvetica Neue',sans-serif"
      font-size="16" font-weight="400" fill="#8ab4d0">Data Scientist · Azure AI Certified · New Delhi, India</text>

    <!-- RIGHT: Stats panel -->
    <!-- Panel background -->
    <rect x="830" y="90" width="320" height="225" rx="14"
      fill="#041428" fill-opacity="0.85" stroke="#00D4FF" stroke-width="0.8" stroke-opacity="0.35"/>

    <!-- Panel title bar -->
    <rect x="830" y="90" width="320" height="36" rx="14" fill="#001a33" fill-opacity="0.9"/>
    <rect x="830" y="108" width="320" height="18" fill="#001a33" fill-opacity="0.9"/>
    <circle cx="852" cy="108" r="6" fill="#ff5f57"/>
    <circle cx="872" cy="108" r="6" fill="#ffbd2e"/>
    <circle cx="892" cy="108" r="6" fill="#28c840"/>
    <text x="920" y="113" font-family="'Courier New',monospace" font-size="11" fill="#8ab4d0">saksham@ai-engineer</text>

    <!-- Stats rows -->
    <text x="850" y="148" font-family="'Courier New',monospace" font-size="12" fill="#00D4FF">❯ </text>
    <text x="868" y="148" font-family="'Courier New',monospace" font-size="12" fill="#e2e8f0">role</text>
    <text x="850" y="166" font-family="'Courier New',monospace" font-size="11" fill="#8ab4d0">  AI Engineer &amp; Data Scientist</text>

    <text x="850" y="185" font-family="'Courier New',monospace" font-size="12" fill="#00D4FF">❯ </text>
    <text x="868" y="185" font-family="'Courier New',monospace" font-size="12" fill="#e2e8f0">certs</text>
    <text x="850" y="202" font-family="'Courier New',monospace" font-size="11" fill="#FFB800">  AI-102 · DP-100 · DP-600 · OCI</text>

    <text x="850" y="221" font-family="'Courier New',monospace" font-size="12" fill="#00D4FF">❯ </text>
    <text x="868" y="221" font-family="'Courier New',monospace" font-size="12" fill="#e2e8f0">wins</text>
    <text x="850" y="238" font-family="'Courier New',monospace" font-size="11" fill="#00E5A0">  🏆 1st · Zero to One (600+ teams)</text>

    <text x="850" y="257" font-family="'Courier New',monospace" font-size="12" fill="#00D4FF">❯ </text>
    <text x="868" y="257" font-family="'Courier New',monospace" font-size="12" fill="#e2e8f0">status</text>
    <text x="850" y="275" font-family="'Courier New',monospace" font-size="11" fill="#00E5A0">  ✓ Open to Work</text>

    <!-- Blinking cursor -->
    <rect x="850" y="285" width="8" height="13" fill="#00D4FF" rx="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom bar -->
    <rect x="60" y="355" width="500" height="1" fill="#00D4FF" opacity="0.15"/>
    <text x="60" y="378"
      font-family="'Segoe UI',sans-serif" font-size="12" fill="#8ab4d0" opacity="0.7">
      github.com/SakshamSuper · portfolio-35r4.vercel.app · sakshamsuper.github.io
    </text>

  </g>
</svg>

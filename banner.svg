<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Portfolio Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </linearGradient>

    <!-- Grid pattern resembling the portfolio's grid -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>

    <!-- Soft ambient cyan bloom in center -->
    <radialGradient id="cyan-bloom" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#020817" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for the title to make it pop -->
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00D4FF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)"/>
  
  <!-- Soft Radial Cyan Bloom -->
  <circle cx="600" cy="150" r="500" fill="url(#cyan-bloom)"/>
  
  <!-- Portfolio Grid -->
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Minimal HUD Accents -->
  <g opacity="0.3">
    <!-- Outer corner indicators -->
    <path d="M 40,60 L 40,40 L 60,40" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <path d="M 1160,60 L 1160,40 L 1140,40" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <path d="M 40,240 L 40,260 L 60,260" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <path d="M 1160,240 L 1160,260 L 1140,260" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  </g>

  <!-- Main Name with wide Syne font styling -->
  <g filter="url(#subtle-shadow)">
    <text x="600" y="145" text-anchor="middle"
      font-family="'Syne', 'Arial Black', sans-serif"
      font-size="80" font-weight="800" letter-spacing="-1"
      fill="#EDF2F7">
      SAKSHAM<tspan fill="#00D4FF">.</tspan>
    </text>
  </g>

  <!-- Subtitle matching JetBrains Mono / DM Sans -->
  <text x="600" y="200" text-anchor="middle"
    font-family="'JetBrains Mono', 'DM Sans', monospace"
    font-size="18" font-weight="600" letter-spacing="6"
    fill="#8892A4">
    AI ENGINEER &amp; DATA SCIENTIST
  </text>

  <!-- HUD Telemetry on bottom -->
  <g opacity="0.4" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8892A4">
    <text x="60" y="260">SYS.STATUS: ONLINE</text>
    <text x="1140" y="260" text-anchor="end">LOC: NEW DELHI, IN</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes scanline {
      0% { transform: translateY(-400px); }
      100% { transform: translateY(400px); }
    }
    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
    @keyframes shimmer-sweep {
      0% { transform: translateX(-150%); }
      100% { transform: translateX(150%); }
    }
    .grid {
      animation: pulse 4s ease-in-out infinite;
    }
    .neon-text {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
    }
    .sub-text {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 6px;
    }
  </style>

  <defs>
    <!-- Background Gradient: Ultra deep space violet to navy black -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050d"/>
      <stop offset="50%" stop-color="#080a1a"/>
      <stop offset="100%" stop-color="#020205"/>
    </linearGradient>

    <!-- Cyberpunk grid pattern -->
    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.07"/>
      <circle cx="40" cy="0" r="1.5" fill="#9D00FF" fill-opacity="0.15"/>
    </pattern>

    <!-- Neon Cyan & Purple Radial glows -->
    <radialGradient id="glow-cyan" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#9D00FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9D00FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Multi-stage laser horizon glow -->
    <linearGradient id="horizon-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="90%" stop-color="#00F5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9D00FF" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Master text gradients -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#00F5FF"/>
      <stop offset="70%" stop-color="#9D00FF"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8F9CAE"/>
      <stop offset="50%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#8F9CAE"/>
    </linearGradient>

    <!-- Filter for high-end neon dropshadow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="20" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tech HUD details -->
    <linearGradient id="hud-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00F5FF" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#9D00FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9D00FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  
  <!-- AMBIENT GLOWS -->
  <rect width="100%" height="100%" fill="url(#glow-cyan)"/>
  <rect width="100%" height="100%" fill="url(#glow-purple)"/>
  
  <!-- GRID (Animated Pulse) -->
  <rect class="grid" width="100%" height="100%" fill="url(#grid-pattern)"/>

  <!-- TECH HUD LINES -->
  <g opacity="0.3">
    <!-- Top & Bottom border elements -->
    <rect x="50" y="20" width="1100" height="1" fill="url(#hud-line)"/>
    <rect x="50" y="380" width="1100" height="1" fill="url(#hud-line)"/>
    
    <!-- Corner brackets -->
    <path d="M 40 40 L 40 20 L 60 20" fill="none" stroke="#00F5FF" stroke-width="2"/>
    <path d="M 1160 40 L 1160 20 L 1140 20" fill="none" stroke="#9D00FF" stroke-width="2"/>
    <path d="M 40 360 L 40 380 L 60 380" fill="none" stroke="#00F5FF" stroke-width="2"/>
    <path d="M 1160 360 L 1160 380 L 1140 380" fill="none" stroke="#9D00FF" stroke-width="2"/>
  </g>

  <!-- GEOMETRIC TECH ELEMENTS -->
  <g opacity="0.15" transform="translate(0,0)">
    <!-- Circuit lines or data waves -->
    <path d="M 100 200 L 250 200 L 300 250 L 500 250" fill="none" stroke="#00F5FF" stroke-width="1.5" stroke-dasharray="5 5"/>
    <path d="M 1100 200 L 950 200 L 900 150 L 700 150" fill="none" stroke="#9D00FF" stroke-width="1.5" stroke-dasharray="5 5"/>
    <circle cx="300" cy="250" r="3" fill="#00F5FF"/>
    <circle cx="900" cy="150" r="3" fill="#9D00FF"/>
  </g>

  <!-- SHIMMERING MOUNTAIN / SYNTHWAVE LANDSCAPE -->
  <g opacity="0.45" transform="translate(0, 80)">
    <path d="M0 320 L150 160 L320 280 L550 100 L800 290 L1020 80 L1200 260 L1200 320 L0 320 Z" fill="#0a0b18" stroke="#9D00FF" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M0 320 L220 200 L450 300 L700 150 L950 280 L1200 180 L1200 320 L0 320 Z" fill="#030408" stroke="#00F5FF" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- LASER HORIZON LINE -->
  <rect x="0" y="318" width="1200" height="4" fill="url(#horizon-grad)"/>

  <!-- NAME CENTERED WITH NEON GLOW -->
  <g filter="url(#neon-glow)">
    <text class="neon-text" x="600" y="225" text-anchor="middle" font-size="160" fill="url(#text-grad)">SAKSHAM</text>
  </g>

  <!-- SUBTITLE WITH CYBERPUNK MONOSPACE STYLE -->
  <text class="sub-text" x="600" y="285" text-anchor="middle" font-size="22" fill="url(#sub-grad)">AI ENGINEER &amp; DATA SCIENTIST</text>

  <!-- TELEMETRY / DETAILED METRICS ON THE SIDES (UX Details) -->
  <g opacity="0.6" font-family="'Courier New', monospace" font-size="11" fill="#8F9CAE">
    <text x="80" y="60">SYS.STATUS: ACTIVE</text>
    <text x="80" y="80">LOC: IN_DEL_NEW</text>
    <text x="80" y="100">CORE.DEV: v3.5</text>
    <rect x="80" y="115" width="80" height="2" fill="#00F5FF" opacity="0.5"/>

    <text x="1000" y="60" text-anchor="end">ML.ENGINE: ON</text>
    <text x="1000" y="80" text-anchor="end">LLM.AGENTS: LOADED</text>
    <text x="1000" y="100" text-anchor="end">VIS.PIPELINE: v2.1</text>
    <rect x="920" y="115" width="80" height="2" fill="#9D00FF" opacity="0.5"/>
  </g>

  <!-- BOTTOM DECORATIVE DOTS / SCALE -->
  <g opacity="0.5" transform="translate(480, 340)">
    <rect x="0" y="0" width="6" height="6" fill="#00F5FF"/>
    <rect x="15" y="0" width="6" height="6" fill="#00F5FF" opacity="0.8"/>
    <rect x="30" y="0" width="6" height="6" fill="#00F5FF" opacity="0.6"/>
    <rect x="45" y="0" width="6" height="6" fill="#9D00FF" opacity="0.6"/>
    <rect x="60" y="0" width="6" height="6" fill="#9D00FF" opacity="0.8"/>
    <rect x="75" y="0" width="6" height="6" fill="#9D00FF"/>
    <text x="95" y="7" font-family="'Courier New', monospace" font-size="9" fill="#8F9CAE">SCALE // 100</text>
  </g>
</svg>

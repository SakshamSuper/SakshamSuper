<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-900;1000;-900" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-500;1400;-500" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- Stat card bg -->
    <linearGradient id="statBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#041428"/>
      <stop offset="100%" stop-color="#020c1a"/>
    </linearGradient>
    <clipPath id="c"><rect width="900" height="200" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <rect width="900" height="200" fill="url(#bg)" rx="12"/>
    <rect width="900" height="200" fill="url(#shimmer)"/>
    <rect width="900" height="200" rx="12" fill="none" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.2"/>

    <!-- Title bar -->
    <rect width="900" height="38" fill="url(#bar)"/>
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>
    <text x="90" y="24" font-family="'Courier New',monospace" font-size="12" fill="#8ab4d0">neofetch --github-stats</text>

    <!-- Left accent -->
    <rect x="0" y="0" width="3" height="200" fill="#00D4FF" opacity="0.6"/>

    <!-- 4 stat cards -->
    <!-- Repos -->
    <rect x="26"  y="56" width="185" height="120" rx="10" fill="url(#statBg)" stroke="#00D4FF" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="118" y="98"  text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="40" font-weight="900" fill="#00D4FF">6</text>
    <text x="118" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#8ab4d0">Public Repos</text>
    <text x="118" y="155" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#636e7b">github.com/SakshamSuper</text>

    <!-- Certifications -->
    <rect x="236" y="56" width="185" height="120" rx="10" fill="url(#statBg)" stroke="#FFB800" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="328" y="98"  text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="40" font-weight="900" fill="#FFB800">5</text>
    <text x="328" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#8ab4d0">Certifications</text>
    <text x="328" y="155" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#636e7b">AI-102 · DP-100 · DP-600 · OCI</text>

    <!-- Hackathon wins -->
    <rect x="446" y="56" width="185" height="120" rx="10" fill="url(#statBg)" stroke="#00E5A0" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="538" y="98"  text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="40" font-weight="900" fill="#00E5A0">2</text>
    <text x="538" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#8ab4d0">Hackathon Wins</text>
    <text x="538" y="155" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#636e7b">🏆 1st · 🥈 Runner-Up</text>

    <!-- Member since -->
    <rect x="656" y="56" width="218" height="120" rx="10" fill="url(#statBg)" stroke="#6366f1" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="765" y="98"  text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="36" font-weight="900" fill="#6366f1">2023</text>
    <text x="765" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#8ab4d0">Member Since</text>
    <text x="765" y="155" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#636e7b">Open to Work ✓</text>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480">
  <style>
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    @keyframes green-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes card-shine {
      0% { stroke-opacity: 0.2; }
      50% { stroke-opacity: 0.5; }
      100% { stroke-opacity: 0.2; }
    }
    .bg-grid {
      fill: none;
      stroke: #ffffff;
      stroke-width: 1;
      stroke-opacity: 0.02;
    }
    .orb-blue {
      fill: #0ea5e9;
      filter: blur(60px);
      opacity: 0.1;
      animation: pulse-glow 6s ease-in-out infinite;
    }
    .orb-purple {
      fill: #8b5cf6;
      filter: blur(60px);
      opacity: 0.08;
      animation: pulse-glow 8s ease-in-out infinite;
    }
    .text-display {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: bold;
    }
    .text-sans {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .text-mono {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .card-border {
      fill: #0b0c10;
      fill-opacity: 0.6;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: 1;
      rx: 12;
      transition: all 0.3s;
    }
    .cert-card {
      fill: #0a0b0d;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
      rx: 10;
    }
  </style>

  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="bg-grid" />
    </pattern>

    <!-- Glowing gradients -->
    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="glow-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="50%" stop-color="rgba(14, 165, 233, 0.15)" />
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.08)" />
    </linearGradient>
  </defs>

  <!-- Transparent Container with Border -->
  <rect width="1000" height="480" fill="#0d1117" rx="16" />
  <rect width="1000" height="480" fill="url(#grid-pattern)" rx="16" />
  
  <!-- Ambient glows -->
  <circle cx="200" cy="150" r="180" class="orb-blue" />
  <circle cx="800" cy="300" r="200" class="orb-purple" />
  
  <!-- Master border -->
  <rect x="1" y="1" width="998" height="478" fill="none" stroke="url(#border-glow)" stroke-width="1.5" rx="16" />

  <!-- ==================== LEFT COLUMN: HERO ==================== -->
  <g transform="translate(50, 0)">
    <!-- Code Bracket Icon -->
    <text x="0" y="60" class="text-display" font-size="22" fill="#F8FAFC" opacity="0.8">&lt;/&gt;</text>

    <!-- Availability Badge -->
    <g transform="translate(0, 85)">
      <rect width="130" height="24" rx="12" fill="rgba(16, 185, 129, 0.06)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1" />
      <circle cx="16" cy="12" r="4" fill="#10b981">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite" />
      </circle>
      <text x="28" y="16" class="text-sans" font-weight="bold" font-size="9.5" fill="#10b981" letter-spacing="0.5">OPEN TO WORK</text>
    </g>

    <!-- Name & Description -->
    <text x="0" y="145" class="text-display" font-size="34" fill="#F8FAFC">Saksham Aggarwal</text>
    <text x="0" y="172" class="text-sans" font-size="14.5" fill="#0ea5e9" font-weight="bold" letter-spacing="1">AI ENGINEER &amp; DATA SCIENTIST</text>

    <text x="0" y="210" class="text-sans" font-size="12.5" fill="#94A3B8" font-weight="500">
      <tspan x="0" dy="0">Building intelligent systems using Machine</tspan>
      <tspan x="0" dy="18">Learning, Computer Vision, and Data Science.</tspan>
    </text>

    <!-- Bullet details -->
    <g transform="translate(0, 260)" class="text-mono" font-size="11.5" fill="#64748B">
      <text x="0" y="0"><tspan fill="#0ea5e9">❯</tspan> focus  : CV · LLM · forecasting</text>
      <text x="0" y="20"><tspan fill="#0ea5e9">❯</tspan> edu    : GGSIPU, New Delhi</text>
      <text x="0" y="40"><tspan fill="#0ea5e9">❯</tspan> status : active developer</text>
    </g>
  </g>

  <!-- Vertical Divider -->
  <line x1="380" y1="50" x2="380" y2="430" stroke="rgba(255,255,255,0.06)" stroke-width="1" />

  <!-- ==================== RIGHT COLUMN: METRICS ==================== -->
  
  <!-- 1. Verified Credentials Section -->
  <g transform="translate(420, 50)">
    <text x="0" y="18" class="text-sans" font-weight="bold" font-size="11" fill="#94A3B8" letter-spacing="2">VERIFIED CREDENTIALS</text>
    
    <!-- Row of 5 cert cards -->
    <g transform="translate(0, 32)">
      <!-- Cert 1: Azure AI -->
      <g transform="translate(0, 0)">
        <rect width="100" height="100" class="cert-card" />
        <image href="https://learn.microsoft.com/media/learn/certification/badges/microsoft-certified-associate-badge.svg" x="25" y="15" width="50" height="50" />
        <text x="50" y="80" class="text-sans" font-size="9.5" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Azure AI</text>
        <text x="50" y="92" class="text-mono" font-size="8" fill="#64748B" text-anchor="middle">AI-102</text>
      </g>
      <!-- Cert 2: Data Scientist -->
      <g transform="translate(110, 0)">
        <rect width="100" height="100" class="cert-card" />
        <image href="https://learn.microsoft.com/media/learn/certification/badges/microsoft-certified-associate-badge.svg" x="25" y="15" width="50" height="50" />
        <text x="50" y="80" class="text-sans" font-size="9.5" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Data Scientist</text>
        <text x="50" y="92" class="text-mono" font-size="8" fill="#64748B" text-anchor="middle">DP-100</text>
      </g>
      <!-- Cert 3: Fabric Analyst -->
      <g transform="translate(220, 0)">
        <rect width="100" height="100" class="cert-card" />
        <image href="https://learn.microsoft.com/media/learn/certification/badges/microsoft-certified-associate-badge.svg" x="25" y="15" width="50" height="50" />
        <text x="50" y="80" class="text-sans" font-size="9.5" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Fabric Analyst</text>
        <text x="50" y="92" class="text-mono" font-size="8" fill="#64748B" text-anchor="middle">DP-600</text>
      </g>
      <!-- Cert 4: Oracle OCI -->
      <g transform="translate(330, 0)">
        <rect width="100" height="100" class="cert-card" />
        <image href="https://images.credly.com/size/340x340/images/42171545-21d3-4a11-b0be-3cd9cdb84f3e/image.png" x="25" y="15" width="50" height="50" />
        <text x="50" y="80" class="text-sans" font-size="9.5" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Oracle OCI</text>
        <text x="50" y="92" class="text-mono" font-size="8" fill="#64748B" text-anchor="middle">Cloud</text>
      </g>
      <!-- Cert 5: Postman Expert -->
      <g transform="translate(440, 0)">
        <rect width="100" height="100" class="cert-card" />
        <image href="https://images.credly.com/size/340x340/images/2237eb89-bc89-4bc2-afdf-3e61c5bc79fa/image.png" x="25" y="15" width="50" height="50" />
        <text x="50" y="80" class="text-sans" font-size="9.5" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Postman API</text>
        <text x="50" y="92" class="text-mono" font-size="8" fill="#64748B" text-anchor="middle">Expert</text>
      </g>
    </g>
  </g>

  <!-- 2. Hackathon Wins Section -->
  <g transform="translate(420, 220)">
    <text x="0" y="18" class="text-sans" font-weight="bold" font-size="11" fill="#94A3B8" letter-spacing="2">HACKATHON WINS</text>
    
    <!-- Win 1: Zero to One -->
    <g transform="translate(0, 32)">
      <rect width="265" height="105" class="card-border" stroke="rgba(251, 191, 36, 0.2)" />
      <text x="25" y="42" font-size="28">🏆</text>
      <text x="70" y="34" class="text-sans" font-size="13.5" font-weight="bold" fill="url(#glow-gold)">1st Place Winner</text>
      <text x="70" y="54" class="text-sans" font-size="11.5" font-weight="bold" fill="#F8FAFC">Zero to One Hackathon</text>
      <text x="70" y="72" class="text-sans" font-size="10.5" fill="#8892A4">Chandigarh Univ // 600+ Teams</text>
      <rect x="70" y="82" width="62" height="14" rx="3" fill="rgba(251, 191, 36, 0.08)" />
      <text x="101" y="92" class="text-mono" font-size="8" fill="#fbbf24" font-weight="bold" text-anchor="middle">CHAMPION</text>
    </g>

    <!-- Win 2: HackLLM -->
    <g transform="translate(285, 32)">
      <rect width="255" height="105" class="card-border" stroke="rgba(255, 255, 255, 0.08)" />
      <text x="25" y="42" font-size="28">🥈</text>
      <text x="70" y="34" class="text-sans" font-size="13.5" font-weight="bold" fill="#E2E8F0">1st Runner-Up</text>
      <text x="70" y="54" class="text-sans" font-size="11.5" font-weight="bold" fill="#F8FAFC">HackLLM Hackathon</text>
      <text x="70" y="72" class="text-sans" font-size="10.5" fill="#8892A4">IIIT Delhi // LLM Agent Track</text>
      <rect x="70" y="82" width="60" height="14" rx="3" fill="rgba(255, 255, 255, 0.06)" />
      <text x="100" y="92" class="text-mono" font-size="8" fill="#94A3B8" font-weight="bold" text-anchor="middle">LLM TRACK</text>
    </g>
  </g>

  <!-- Bottom Telemetry HUD Line -->
  <line x1="50" y1="410" x2="950" y2="410" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  
  <g font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#64748B" opacity="0.8">
    <!-- Quick stats indicators -->
    <text x="50" y="435">PROJECTS: 6+</text>
    <text x="170" y="435">CERTS: 5×</text>
    <text x="260" y="435">WINS: 2×</text>
    <text x="950" y="435" text-anchor="end">SYS.UI: v3.6.1 // PORTFOLIO CONNECT</text>
  </g>
</svg>

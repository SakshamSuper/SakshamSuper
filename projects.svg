<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b1a14"/>
      <stop offset="100%" stop-color="#07080c"/>
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.25)" />
      <stop offset="100%" stop-color="rgba(0, 212, 255, 0.1)" />
    </linearGradient>
    <clipPath id="window-clip"><rect width="700" height="200" rx="10" ry="10"/></clipPath>
  </defs>

  <g clip-path="url(#window-clip)">
    <!-- Terminal Body -->
    <rect width="700" height="200" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="699" height="199" fill="none" stroke="url(#border-glow)" stroke-width="1.2" rx="10" ry="10" />

    <!-- Title Bar -->
    <rect width="700" height="32" fill="url(#header-bg)"/>
    <line x1="0" y1="32" x2="700" y2="32" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

    <!-- macOS traffic buttons -->
    <circle cx="16" cy="16" r="4.5" fill="#ff5f56"/>
    <circle cx="30" cy="16" r="4.5" fill="#ffbd2e"/>
    <circle cx="44" cy="16" r="4.5" fill="#27c93f"/>
    <text x="350" y="20" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8892A4">console // projects</text>

    <!-- Terminal Content -->
    <g transform="translate(25, 58)" font-family="'JetBrains Mono', monospace" font-size="12" fill="#E2E8F0">
      <text x="0" y="0"><tspan fill="#10b981">❯ </tspan>ls ~/projects --featured</text>
      
      <g transform="translate(15, 22)" fill="#94A3B8">
        <!-- Posture -->
        <g transform="translate(0, 0)">
          <path d="M 0,2 L 3,-2 L 9,-2 L 10,0 L 22,0 L 22,10 L 0,10 Z" fill="none" stroke="#10b981" stroke-width="1.2"/>
          <text x="30" y="8" font-weight="bold" fill="#10b981">POSTURE-ANALYSIS-SYSTEM</text>
          <text x="215" y="8" fill="#8892A4">// Real-time CV posture angles pipeline</text>
        </g>
        
        <!-- AI Physio -->
        <g transform="translate(0, 20)">
          <path d="M 0,2 L 3,-2 L 9,-2 L 10,0 L 22,0 L 22,10 L 0,10 Z" fill="none" stroke="#10b981" stroke-width="1.2"/>
          <text x="30" y="8" font-weight="bold" fill="#10b981">AI-physio-analysis</text>
          <text x="215" y="8" fill="#8892A4">// Computer vision action classifier model</text>
        </g>
        
        <!-- Crypto -->
        <g transform="translate(0, 40)">
          <path d="M 0,2 L 3,-2 L 9,-2 L 10,0 L 22,0 L 22,10 L 0,10 Z" fill="none" stroke="#10b981" stroke-width="1.2"/>
          <text x="30" y="8" font-weight="bold" fill="#10b981">CRYPTO_PRICE_ANALYSIS</text>
          <text x="215" y="8" fill="#8892A4">// Time-series forecasting predictive ML</text>
        </g>

        <!-- Portfolio -->
        <g transform="translate(0, 60)">
          <path d="M 0,2 L 3,-2 L 9,-2 L 10,0 L 22,0 L 22,10 L 0,10 Z" fill="none" stroke="#10b981" stroke-width="1.2"/>
          <text x="30" y="8" font-weight="bold" fill="#10b981">portfolio</text>
          <text x="215" y="8" fill="#8892A4">// Premium dark themed editorial UI/UX website</text>
        </g>
      </g>
    </g>

    <!-- Status bar at bottom -->
    <rect x="0" y="182" width="700" height="18" fill="#161b22"/>
    <text x="20" y="194" font-family="'JetBrains Mono', monospace" font-size="10" fill="#10b981">● main</text>
    <text x="560" y="194" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8892A4">4 featured repos</text>
  </g>
</svg>

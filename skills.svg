<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" width="700" height="310">
  <style>
    @keyframes bar-fill {
      0% { width: 0px; }
    }
    .neon-border {
      stroke: #9D00FF;
      stroke-width: 1.5;
      stroke-opacity: 0.8;
      filter: drop-shadow(0px 0px 4px rgba(157, 0, 255, 0.4));
    }
    .text-title {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      fill: #8F9CAE;
    }
    .text-body {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      fill: #e6edf3;
    }
    .text-accent {
      fill: #9D00FF;
      font-weight: bold;
    }
    .bar-bg {
      fill: #161b22;
      rx: 4.5px;
    }
    .bar-fill-element {
      animation: bar-fill 2s ease-out;
      rx: 4.5px;
    }
  </style>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="term-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16"/>
      <stop offset="100%" stop-color="#05060b"/>
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#140a24"/>
      <stop offset="100%" stop-color="#070812"/>
    </linearGradient>

    <!-- Gradient fills for the progress bars -->
    <linearGradient id="g-python" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3776AB"/><stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <linearGradient id="g-tensorflow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6F00"/><stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="g-opencv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C3EE8"/><stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <linearGradient id="g-azure" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0078D4"/><stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <linearGradient id="g-pytorch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EE4C2C"/><stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <linearGradient id="g-ts" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3178C6"/><stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <linearGradient id="g-cpp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00599C"/><stop offset="100%" stop-color="#9D00FF"/>
    </linearGradient>

    <!-- Clip Path for rounded corners -->
    <clipPath id="window-clip">
      <rect width="700" height="310" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#window-clip)">
    <!-- Terminal Background -->
    <rect width="700" height="310" fill="url(#term-bg)"/>
    
    <!-- Neon purple outer border path -->
    <rect x="0.75" y="0.75" width="698.5" height="308.5" fill="none" class="neon-border" rx="12" ry="12"/>

    <!-- Title Bar -->
    <rect width="700" height="38" fill="url(#header-bg)"/>
    <line x1="0" y1="38" x2="700" y2="38" stroke="#9D00FF" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- macOS Window Buttons -->
    <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#27c93f"/>

    <!-- Window Title -->
    <text class="text-title" x="350" y="24" text-anchor="middle" font-size="12" letter-spacing="1">saksham@skills-analyzer:~</text>
    
    <!-- Tech Info Top Right -->
    <rect x="610" y="12" width="65" height="14" rx="3" fill="#9D00FF" fill-opacity="0.1" stroke="#9D00FF" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="642" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#9D00FF" font-weight="bold">STATS</text>

    <!-- Terminal Content Area -->
    <g transform="translate(30, 72)" class="text-body">
      <!-- Command prompt -->
      <text y="0">
        <tspan class="text-accent">❯ </tspan>
        <tspan font-weight="bold" fill="#ffffff">skills --proficiency</tspan>
      </text>

      <line x1="-10" y1="12" x2="650" y2="12" stroke="#21262d" stroke-width="1"/>

      <!-- Progress bars group -->
      <g transform="translate(0, 32)">
        <!-- Python -->
        <text x="0" y="10" fill="#8b949e">Python</text>
        <rect x="110" y="0" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="1" width="404" height="7" class="bar-fill-element" fill="url(#g-python)"/>
        <text x="580" y="10" fill="#00F5FF" font-weight="bold">92%</text>

        <!-- TensorFlow -->
        <text x="0" y="32" fill="#8b949e">TensorFlow</text>
        <rect x="110" y="22" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="23" width="371" height="7" class="bar-fill-element" fill="url(#g-tensorflow)"/>
        <text x="580" y="32" fill="#FFB800" font-weight="bold">85%</text>

        <!-- OpenCV -->
        <text x="0" y="54" fill="#8b949e">OpenCV/CV</text>
        <rect x="110" y="44" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="45" width="386" height="7" class="bar-fill-element" fill="url(#g-opencv)"/>
        <text x="580" y="54" fill="#00F5FF" font-weight="bold">88%</text>

        <!-- Azure AI -->
        <text x="0" y="76" fill="#8b949e">Azure AI</text>
        <rect x="110" y="66" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="67" width="371" height="7" class="bar-fill-element" fill="url(#g-azure)"/>
        <text x="580" y="76" fill="#0078D4" font-weight="bold">85%</text>

        <!-- PyTorch -->
        <text x="0" y="98" fill="#8b949e">PyTorch</text>
        <rect x="110" y="88" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="89" width="357" height="7" class="bar-fill-element" fill="url(#g-pytorch)"/>
        <text x="580" y="98" fill="#EE4C2C" font-weight="bold">82%</text>

        <!-- TypeScript -->
        <text x="0" y="120" fill="#8b949e">TypeScript</text>
        <rect x="110" y="110" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="111" width="347" height="7" class="bar-fill-element" fill="url(#g-ts)"/>
        <text x="580" y="120" fill="#00F5FF" font-weight="bold">80%</text>

        <!-- C++ -->
        <text x="0" y="142" fill="#8b949e">C++</text>
        <rect x="110" y="132" width="450" height="9" class="bar-bg"/>
        <rect x="115" y="133" width="338" height="7" class="bar-fill-element" fill="url(#g-cpp)"/>
        <text x="580" y="142" fill="#9D00FF" font-weight="bold">78%</text>
      </g>

      <line x1="-10" y1="205" x2="650" y2="205" stroke="#21262d" stroke-width="1"/>

      <!-- Prompt bottom line -->
      <g transform="translate(0, 222)">
        <text class="text-accent" y="0">❯</text>
        <rect class="bar-fill-element" x="16" y="-12" width="8" height="15" fill="#e6edf3" opacity="0.8"/>
      </g>
    </g>
  </g>
</svg>

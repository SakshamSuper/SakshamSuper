<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" width="700" height="310">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" values="-200;900" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0;1100" dur="4s" repeatCount="indefinite" />
    </linearGradient>
    <clipPath id="windowClip">
      <rect width="700" height="310" rx="10" ry="10" />
    </clipPath>

    <!-- Progress Gradients -->
    <linearGradient id="barPy" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3776AB"/><stop offset="100%" stop-color="#58a6ff"/></linearGradient>
    <linearGradient id="barTF" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FF6F00"/><stop offset="100%" stop-color="#ffbd2e"/></linearGradient>
    <linearGradient id="barCV" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5C3EE8"/><stop offset="100%" stop-color="#00D4FF"/></linearGradient>
    <linearGradient id="barAzure" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0078D4"/><stop offset="100%" stop-color="#00D4FF"/></linearGradient>
    <linearGradient id="barCpp" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00599C"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="barTS" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3178C6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="barTorch" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#EE4C2C"/><stop offset="100%" stop-color="#FF6F00"/></linearGradient>
  </defs>

  <g clip-path="url(#windowClip)">
    <rect width="700" height="310" fill="url(#termBg)"/>
    <rect width="700" height="310" fill="none" stroke="#30363d" stroke-width="2"/>
    <rect width="700" height="35" fill="url(#titleBarGrad)"/>
    <rect width="700" height="35" fill="url(#shimmer)"/>
    
    <circle cx="20" cy="17.5" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="17.5" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="17.5" r="6" fill="#27c93f"/>

    <text x="350" y="23" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" text-anchor="middle">saksham@github:~</text>
    <rect x="0" y="35" width="700" height="1" fill="#30363d"/>

    <g font-family="'Courier New', monospace" font-size="15" transform="translate(25, 65)">
      <text fill="#00D4FF">❯ <tspan fill="#e6edf3">skills --proficiency</tspan></text>
      
      <g transform="translate(0, 30)">
        <!-- Python -->
        <g transform="translate(0, 0)">
          <text fill="#8b949e" y="10" font-size="14">Python</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="386.4" height="8" rx="4" fill="url(#barPy)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">92%</text>
        </g>

        <!-- OpenCV/CV -->
        <g transform="translate(0, 25)">
          <text fill="#8b949e" y="10" font-size="14">OpenCV/CV</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="369.6" height="8" rx="4" fill="url(#barCV)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">88%</text>
        </g>
        
        <!-- TensorFlow -->
        <g transform="translate(0, 50)">
          <text fill="#8b949e" y="10" font-size="14">TensorFlow</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="357" height="8" rx="4" fill="url(#barTF)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">85%</text>
        </g>

        <!-- Azure AI -->
        <g transform="translate(0, 75)">
          <text fill="#8b949e" y="10" font-size="14">Azure AI</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="357" height="8" rx="4" fill="url(#barAzure)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">85%</text>
        </g>

        <!-- PyTorch -->
        <g transform="translate(0, 100)">
          <text fill="#8b949e" y="10" font-size="14">PyTorch</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="344.4" height="8" rx="4" fill="url(#barTorch)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">82%</text>
        </g>
        
        <!-- TypeScript -->
        <g transform="translate(0, 125)">
          <text fill="#8b949e" y="10" font-size="14">TypeScript</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="336" height="8" rx="4" fill="url(#barTS)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">80%</text>
        </g>

        <!-- C++ -->
        <g transform="translate(0, 150)">
          <text fill="#8b949e" y="10" font-size="14">C++</text>
          <rect x="130" y="2" width="420" height="8" rx="4" fill="#21262d"/>
          <rect x="130" y="2" width="327.6" height="8" rx="4" fill="url(#barCpp)"/>
          <text x="570" y="10" fill="#e6edf3" font-size="14">78%</text>
        </g>
        
        <!-- Prompt & Cursor -->
        <g transform="translate(0, 185)">
          <text fill="#00D4FF">❯</text>
          <rect x="15" y="-12" width="10" height="15" fill="#e6edf3">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
    </g>
  </g>
</svg>
